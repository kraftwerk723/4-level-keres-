<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lóhere Kereső App</title>
    <!-- Tailwind CSS a szép megjelenésért -->
    <script src="https://jsdelivr.net"></script>
    <style>
        /* Tükröződésmentesítés és videó igazítás */
        #videoInput { transform: scaleX(1); width: 100%; max-width: 500px; display: none; }
        #canvasOutput { width: 100%; max-width: 500px; border-radius: 12px; }
    </style>
</head>
<body class="bg-gray-900 text-white flex flex-col items-center justify-between min-h-screen p-4 font-sans">

    <!-- Fejléc -->
    <header class="text-center my-4">
        <h1 class="text-2xl font-bold text-green-400">🍀 Lóhere Detektor</h1>
        <p class="text-xs text-gray-400 mt-1">Keresd meg a négylevelűt számítógépes látással!</p>
    </header>

    <!-- Kijelző terület -->
    <main class="relative flex flex-col items-center justify-center w-full max-w-md bg-gray-800 p-2 rounded-2xl shadow-2xl">
        <div id="status" class="absolute top-4 left-4 bg-black/70 px-3 py-1 rounded-full text-xs text-yellow-400 z-10">
            OpenCV töltése...
        </div>
        
        <!-- Rejtett videó és a látható feldolgozott vászon -->
        <video id="videoInput" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
    </main>

    <!-- Vezérlők -->
    <footer class="w-full max-w-md my-4 flex flex-col gap-3">
        <button id="startBtn" disabled class="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-700 text-white font-semibold py-3 px-6 rounded-xl transition duration-200 shadow-lg cursor-pointer">
            Kamera indítása
        </button>
        <p class="text-[10px] text-center text-gray-500 px-4">
            Tipp: Irányítsd a kamerát egyenletes megvilágítású zöld területre. Az app a kerekded formákat és a zöld színeket elemzi.
        </p>
    </footer>

    <!-- OpenCV.js betöltése -->
    <script async src="https://opencv.org" type="text/javascript" id="opencv-src"></script>

    <script>
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const video = document.getElementById('videoInput');
        const canvas = document.getElementById('canvasOutput');
        let stream = null;

        // 1. Megvárjuk, amíg az OpenCV.js teljesen betölt
        document.getElementById('opencv-src').addEventListener('load', () => {
            statusEl.textContent = " Ready. Indíthatod!";
            statusEl.className = "absolute top-4 left-4 bg-green-900/80 px-3 py-1 rounded-full text-xs text-green-300 z-10";
            startBtn.disabled = false;
        });

        // 2. Kamera elindítása
        startBtn.addEventListener('click', async () => {
            try {
                startBtn.disabled = true;
                startBtn.textContent = "Detektálás fut...";
                
                // Hátoldali kamera kérése mobilon (environment)
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.play();
                
                // Miután elindult a videó, kezdődik a feldolgozás
                video.addEventListener('canplay', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    startProcessing();
                });
            } catch (err) {
                console.error("Kamera hiba: ", err);
                statusEl.textContent = "Hiba: Nincs kamerahozzáférés!";
                statusEl.className = "absolute top-4 left-4 bg-red-900/80 px-3 py-1 rounded-full text-xs text-red-300 z-10";
            }
        });

        // 3. Képfeldolgozási logika (Computer Vision)
        function startProcessing() {
            let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            let hsv = new cv.Mat();
            let mask = new cv.Mat();
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            
            let cap = new cv.VideoCapture(video);

            const FPS = 30;
            function processVideo() {
                try {
                    if (!stream) return;
                    
                    // Aktuális képkocka beolvasása a kamerából
                    cap.read(src);
                    
                    // Színtér konvertálása HSV-re a jobb zöld szín-szűrésért
                    cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB);
                    cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV);
                    
                    // Zöld szín tartomány meghatározása (fű és lóhere színe)
                    // Ezek a számok finomhangolhatók a fényviszonyok szerint
                    let lowGreen = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [35, 40, 40, 0]);
                    let highGreen = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [85, 255, 255, 255]);
                    
                    // Maszkolás: csak a zöld részek maradnak meg, a többi fekete lesz
                    cv.inRange(hsv, lowGreen, highGreen, mask);
                    
                    // Körvonalak (kontúrok) megkeresése a zöld foltokon
                    cv.findContours(mask, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);
                    
                    // Kontúrok elemzése
                    for (let i = 0; i < contours.size(); ++i) {
                        let cnt = contours.get(i);
                        let area = cv.contourArea(cnt);
                        
                        // Csak a releváns méretű foltokat nézzük (kiszűrjük a zajt)
                        if (area > 300 && area < 5000) {
                            
                            // Körkörösség ellenőrzése (a lóhere levelei kerekdedek)
                            let perimeter = cv.arcLength(cnt, true);
                            let circularity = (4 * Math.PI * area) / (perimeter * perimeter);
                            
                            // Ha a forma elég kerek (0.6 feletti érték)
                            if (circularity > 0.6) {
                                let rect = cv.boundingRect(cnt);
                                
                                // Geometriai középpont kiszámítása
                                let M = cv.moments(cnt);
                                let cx = Math.round(M.m10 / M.m00);
                                let cy = Math.round(M.m01 / M.m00);
                                
                                // RAJZOLÁS: Egy sárga célkeresztet teszünk a potenciális levelekre
                                let color = new cv.Scalar(255, 215, 0, 255); // Arany/Sárga
                                cv.circle(src, new cv.Point(cx, cy), 15, color, 2);
                            }
                        }
                        cnt.delete();
                    }
                    
                    // Eredmény megjelenítése a kijelzőn
                    cv.imshow('canvasOutput', src);
                    
                    // Memória ürítése a szivárgás megelőzésére
                    lowGreen.delete();
                    highGreen.delete();
                    
                    // Következő képkocka ütemezése
                    setTimeout(processVideo, 1000 / FPS);
                } catch (err) {
                    console.error("Feldolgozási hiba: ", err);
                }
            }

            // Indítás
            setTimeout(processVideo, 0);
        }
    </script>
</body>
</html>
