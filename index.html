"45" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-green-500"> </div> </div> <footer class="w-full max-w-md mb-2 flex flex-col gap-2"> <button id="startBtn" disabled class="w-full bg-green-600 hover:bg-green-500 disabled:bg-gray-700 text-white font-semibold py-3 px-6 rounded-xl transition shadow-lg cursor-pointer text-lg"> Kamera & Szkennelés indítása </button> </footer> <!-- OpenCV.js --> <script async src="https://opencv.org" type="text/javascript" id="opencv-src"></script> <script> const statusEl = document.getElementById('status'); const alarmEl = document.getElementById('alarm'); const startBtn = document.getElementById('startBtn'); const video = document.getElementById('videoInput'); const canvas = document.getElementById('canvasOutput'); const valSlider = document.getElementById('valSlider'); const distSlider = document.getElementById('distSlider'); const valVal = document.getElementById('valVal'); const distVal = document.getElementById('distVal'); let stream = null; let audioCtx = null; valSlider.oninput = function() { valVal.textContent = this.value; } distSlider.oninput = function() { distVal.textContent = this.value + " px"; } // Csipogó hangjelzés funkció a találatkor function playBeep() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain(); osc.type = "sine"; osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Magas hang gain.gain.setValueAtTime(0.3, audioCtx.currentTime); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15); // 0.15 másodperces csipogás } document.getElementById('opencv-src').addEventListener('load', () => { statusEl.textContent = " Ready. Szkennelésre kész!"; statusEl.className = "absolute top-4 left-4 bg-green-900/90 px-3 py-1 rounded-full text-xs text-green-300 z-10 font-semibold"; startBtn.disabled = false; }); startBtn.addEventListener('click', async () => { try { // Audio kontextus inicializálása felhasználói interakcióra audioCtx = new (window.AudioContext || window.webkitAudioContext)(); startBtn.disabled = true; startBtn.textContent = "Szkennelés folyamatban..."; stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false }); video.srcObject = stream; video.play(); video.addEventListener('canplay', () => { canvas.width = video.videoWidth; canvas.height = video.videoHeight; startProcessing(); }); } catch (err) { statusEl.textContent = "Kamera hiba!"; } }); function startProcessing() { let src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4); let hsv = new cv.Mat(); let mask = new cv.Mat(); let contours = new cv.MatVector(); let hierarchy = new cv.Mat(); let cap = new cv.VideoCapture(video); const FPS = 24; function processVideo() { try { if (!stream) return; cap.read(src); cv.cvtColor(src, hsv, cv.COLOR_RGBA2RGB); cv.cvtColor(hsv, hsv, cv.COLOR_RGB2HSV); let currentVal = parseInt(valSlider.value); let maxClusterDist = parseInt(distSlider.value); // Fix optimális zöld tartomány (Hue: 35-75) a csúszkás fényerővel kombinálva let lowGreen = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [35, 45, currentVal, 0]); let highGreen = new cv.Mat(hsv.rows, hsv.cols, hsv.type(), [75, 255, 255, 255]); cv.inRange(hsv, lowGreen, highGreen, mask); cv.findContours(mask, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE); let leafPoints = []; // 1. LÉPÉS: Megkeressük az összes kerek levelet a képen for (let i = 0; i < contours.size(); ++i) { let cnt = contours.get(i); let area = cv.contourArea(cnt); if (area > 150&& area < 10000) { let perimeter = cv.arcLength(cnt, true); let circularity = (4 * Math.PI * area) / (perimeter * perimeter); if (circularity > 0.55) { let M = cv.moments(cnt); if (M.m00 !== 0) { let cx = Math.round(M.m10 / M.m00); let cy = Math.round(M.m01 / M.m00); leafPoints.push({x: cx, y: cy, used: false}); } } } cnt.delete(); } // 2. LÉ 0; i < leafPoints.length; i++) { if (leafPoints[i].used) continue; let cluster = [leafPoints[i]]; leafPoints[i].used = true; // Megnézzük, hány másik levél van a közelében for (let j = 0; j < leafPoints.length; j++) { if (leafPoints[j].used) continue; // Távolság kiszámítása a két levél középpontja között let dx = leafPoints[i].x - leafPoints[j].x; let dy = leafPoints[i].y - leafPoints[j].y; let distance = Math.sqrt(dx*dx + dy*dy); if (distance < maxClusterDist) { cluster.push(leafPoints[j]); leafPoints[j].used = true; } } // Középpont kiszámítása a csoportnak let avgX = 0, avgY = 0; cluster.forEach(p => { avgX += p.x; avgY += p.y; }); avgX = Math.round(avgX / cluster.length); avgY = Math.round(avgY / cluster.length); // 3. LÉPÉS: DÖNTÉS ÉS RAJZOLÁS if (cluster.length === 4) { // SIKER! Megvan a 4 levél egy rakáson! foundFourLeaf = true; // Vastag PIROS dupla kör a négylevelűre
